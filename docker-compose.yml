services:
  db:
    image: postgres:15
    container_name: ai_route_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ai_route_web
    command: bash -lc "bundle check || bundle install; rm -f tmp/pids/server.pid && bin/rails server -b 0.0.0.0 -p 3000"
    volumes:
      - .:/rails
      - bundle-data:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      RAILS_ENV: development
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

  css:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ai_route_css
    command: bash -lc "bundle check || bundle install; bin/rails tailwindcss:watch"
    volumes:
      - .:/rails
      - bundle-data:/usr/local/bundle
    depends_on:
      - web
    env_file:
      - .env
    environment:
      RAILS_ENV: development
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

volumes:
  db-data:
  bundle-data:
